<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASHLESH THE LEGEND</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { position:absolute; top:0; left:0; transform:scaleX(-1); }
video  { display:none; }

#title {
  position:fixed; top:18px; left:50%;
  transform:translateX(-50%);
  font-family:'Cinzel',serif; font-size:20px; font-weight:900;
  letter-spacing:8px; color:#DAA520; white-space:nowrap;
  text-shadow:0 0 20px rgba(218,165,32,0.7), 0 0 50px rgba(255,80,0,0.3);
  pointer-events:none; z-index:10;
}

#hud {
  position:fixed; bottom:22px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:28px; align-items:center;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(218,165,32,0.3);
  padding:10px 28px; border-radius:4px;
  backdrop-filter:blur(8px);
  pointer-events:none; z-index:10;
}
.hi { font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px; white-space:nowrap; }
.fi { color:#ff6600; text-shadow:0 0 10px #ff3300; }
.ic { color:#00ccff; text-shadow:0 0 10px #0099ff; }
.cl { color:#DAA520; text-shadow:0 0 10px #ffaa00; }
.sp { color:rgba(218,165,32,0.35); font-size:14px; }

#credits {
  position:fixed; bottom:22px; right:22px;
  font-family:'Cinzel',serif; font-size:10px;
  letter-spacing:2px; color:rgba(218,165,32,0.45);
  pointer-events:none; z-index:10;
}
</style>
</head>
<body>
<video id="v"></video>
<canvas id="c"></canvas>

<div id="title">⚔ Ashlesh the Legend ⚔</div>
<div id="hud">
  <span class="hi fi">🔥 Left · Fire</span>
  <span class="sp">|</span>
  <span class="hi ic">❄ Right · Ice</span>
  <span class="sp">|</span>
  <span class="hi cl">👏 Clap · Explosion</span>
</div>
<div id="credits">Created by ashleshaa</div>

<!-- Loading overlay -->
<div id="overlay" style="
  position:fixed;inset:0;background:#000;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
">
  <div style="font-family:'Cinzel',serif;font-size:26px;font-weight:900;letter-spacing:8px;color:#DAA520;
    text-shadow:0 0 30px rgba(218,165,32,0.8);">⚔ ASHLESH THE LEGEND ⚔</div>

  <div id="start-btn" onclick="startApp()" style="
    font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;color:#000;
    background:#DAA520;padding:14px 40px;border-radius:3px;cursor:pointer;
    box-shadow:0 0 30px rgba(218,165,32,0.6);transition:transform .15s;
  " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
    ▶ ACTIVATE POWERS
  </div>

  <div id="load-status" style="
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;
    color:rgba(218,165,32,0.5);display:none;
  ">LOADING MODEL...</div>

  <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.25);">
    Allow camera access when prompted
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const video  = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Particles ─────────────────────────────────────────────────────────────────
let particles  = [];
let flashRings = [];
const MAX_P    = 1200;

function add(p){ if(particles.length < MAX_P) particles.push(p); }

// Spawn a glowing puff at (x,y)
function puff(x, y, type, n=1, spread=22, baseSpeed=5){
  for(let i=0;i<n;i++){
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * baseSpeed + 1.5;
    add({
      x: x + (Math.random()-.5)*spread,
      y: y + (Math.random()-.5)*spread,
      vx: Math.cos(a)*s*.7,
      vy: Math.sin(a)*s - (Math.random()*5+2),
      life:1,
      decay: .022 + Math.random()*.018,
      size:  Math.random()*24+10,
      type,
      grav: 0
    });
  }
}

// Trailing wisps that float up
function wisp(x, y, type, n=3){
  for(let i=0;i<n;i++){
    add({
      x: x + (Math.random()-.5)*30,
      y: y + (Math.random()-.5)*30,
      vx: (Math.random()-.5)*2.5,
      vy: -(Math.random()*4+1),
      life:1,
      decay: .028 + Math.random()*.02,
      size:  Math.random()*14+5,
      type,
      grav:0
    });
  }
}

function explosion(x, y){
  for(let i=0;i<320;i++){
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*22+4;
    add({
      x, y,
      vx: Math.cos(a)*s,
      vy: Math.sin(a)*s,
      life:1,
      decay: .016 + Math.random()*.016,
      size:  Math.random()*40+8,
      type:  Math.random()<.5?'fire':'ice',
      grav:  .3
    });
  }
  flashRings.push({x, y, life:1, r:0});
}

// ── Render particles ──────────────────────────────────────────────────────────
function renderParticles(W,H){
  ctx.globalCompositeOperation = 'lighter';
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.grav||0;
    p.life -= p.decay;
    if(p.life<=0) return;

    const r = Math.min(p.size * (1.2 - p.life*.3), 60);
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    if(p.type==='fire'){
      g.addColorStop(0,  `rgba(255,255,210,${p.life})`);
      g.addColorStop(.2, `rgba(255,170,0,${p.life*.85})`);
      g.addColorStop(.55,`rgba(255,30,0,${p.life*.45})`);
      g.addColorStop(1,  'rgba(0,0,0,0)');
    } else {
      g.addColorStop(0,  `rgba(255,255,255,${p.life})`);
      g.addColorStop(.25,`rgba(160,240,255,${p.life*.9})`);
      g.addColorStop(.6, `rgba(0,130,255,${p.life*.4})`);
      g.addColorStop(1,  'rgba(0,0,0,0)');
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalCompositeOperation = 'source-over';
}

// ── Render flash rings ────────────────────────────────────────────────────────
function renderFlashes(W,H){
  ctx.globalCompositeOperation = 'lighter';
  flashRings = flashRings.filter(e=>e.life>0);
  flashRings.forEach(e=>{
    e.life -= .055;
    e.r    += (1-e.r)*.1;
    if(e.life<=0) return;
    const maxR = Math.max(W,H)*.8;
    const g = ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,maxR*e.r);
    g.addColorStop(0,   `rgba(255,230,130,${e.life*.95})`);
    g.addColorStop(.12, `rgba(255,120,0,${e.life*.7})`);
    g.addColorStop(.35, `rgba(80,200,255,${e.life*.4})`);
    g.addColorStop(.65, `rgba(255,50,0,${e.life*.12})`);
    g.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  });
  ctx.globalCompositeOperation = 'source-over';
}

// ── Draw palm aura ────────────────────────────────────────────────────────────
function palmAura(x, y, type){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  if(type==='fire'){
    // Outer halo
    let g = ctx.createRadialGradient(x,y,0,x,y,110);
    g.addColorStop(0,  'rgba(255,80,0,.55)');
    g.addColorStop(.5, 'rgba(255,20,0,.22)');
    g.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,110,0,Math.PI*2); ctx.fill();

    // White-hot core
    let c = ctx.createRadialGradient(x,y,0,x,y,30);
    c.addColorStop(0,  'rgba(255,255,220,.95)');
    c.addColorStop(.5, 'rgba(255,140,0,.7)');
    c.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();

    // Pulsing ring
    const pulse = .6 + .3*Math.sin(Date.now()/130);
    ctx.beginPath(); ctx.arc(x,y,50,0,Math.PI*2);
    ctx.strokeStyle = `rgba(255,160,0,${pulse})`;
    ctx.lineWidth   = 2.5;
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur  = 18;
    ctx.stroke();

  } else {
    // Outer halo
    let g = ctx.createRadialGradient(x,y,0,x,y,110);
    g.addColorStop(0,  'rgba(0,180,255,.55)');
    g.addColorStop(.5, 'rgba(0,80,200,.22)');
    g.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,110,0,Math.PI*2); ctx.fill();

    // Bright core
    let c = ctx.createRadialGradient(x,y,0,x,y,28);
    c.addColorStop(0,  'rgba(230,250,255,.95)');
    c.addColorStop(.5, 'rgba(80,200,255,.7)');
    c.addColorStop(1,  'rgba(0,0,0,0)');
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.fill();

    // Spinning dashed ring
    const t = Date.now()/700;
    const pulse = .65 + .25*Math.sin(t);
    ctx.beginPath(); ctx.arc(x,y,52,0,Math.PI*2);
    ctx.setLineDash([8,6]);
    ctx.lineDashOffset = t*15;
    ctx.strokeStyle = `rgba(100,230,255,${pulse})`;
    ctx.lineWidth   = 2.5;
    ctx.shadowColor = '#00ccff';
    ctx.shadowBlur  = 18;
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function sc(lm,i,W,H){ return {x:lm[i].x*W, y:lm[i].y*H}; }
function palmCenter(lm,W,H){
  const w=sc(lm,0,W,H), m=sc(lm,9,W,H);
  return {x:(w.x+m.x)/2, y:(w.y+m.y)/2};
}

// ── Clap cooldown ─────────────────────────────────────────────────────────────
let lastClap = 0;
const CLAP_CD = 1100;

// ── Main results callback ─────────────────────────────────────────────────────
function onResults(results){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0,0,W,H);
  // Draw camera feed
  ctx.drawImage(results.image, 0,0,W,H);

  // Left hand → FIRE
  if(results.leftHandLandmarks){
    const palm = palmCenter(results.leftHandLandmarks, W, H);
    palmAura(palm.x, palm.y, 'fire');
    puff(palm.x, palm.y, 'fire', 5, 25, 4);
    wisp(palm.x, palm.y, 'fire', 2);
  }

  // Right hand → ICE
  if(results.rightHandLandmarks){
    const palm = palmCenter(results.rightHandLandmarks, W, H);
    palmAura(palm.x, palm.y, 'ice');
    puff(palm.x, palm.y, 'ice', 4, 25, 3.5);
    wisp(palm.x, palm.y, 'ice', 2);
  }

  // Clap detection via pose wrists
  if(results.poseLandmarks){
    const lw = sc(results.poseLandmarks, 15, W, H);
    const rw = sc(results.poseLandmarks, 16, W, H);
    const d  = Math.hypot(lw.x-rw.x, lw.y-rw.y);
    const now = Date.now();
    if(d < 85 && now - lastClap > CLAP_CD){
      explosion((lw.x+rw.x)/2, (lw.y+rw.y)/2);
      lastClap = now;
    }
  }

  renderParticles(W,H);
  renderFlashes(W,H);
}

// ── MediaPipe Holistic ────────────────────────────────────────────────────────
const holistic = new Holistic({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}`
});
holistic.setOptions({
  modelComplexity:        1,
  smoothLandmarks:        true,
  minDetectionConfidence: 0.65,
  minTrackingConfidence:  0.5
});

// Wrap onResults to hide overlay on first frame
let overlayGone = false;
holistic.onResults(r => {
  if(!overlayGone){
    overlayGone = true;
    const ov = document.getElementById('overlay');
    ov.style.transition = 'opacity .6s';
    ov.style.opacity    = '0';
    setTimeout(()=> ov.style.display='none', 650);
  }
  onResults(r);
});

var cameraStarted = false;
function startApp(){
  if(cameraStarted) return;
  cameraStarted = true;
  document.getElementById('start-btn').style.display   = 'none';
  document.getElementById('load-status').style.display = 'block';

  const camera = new Camera(video, {
    onFrame: async () => { await holistic.send({image: video}); },
    width: 1280, height: 720
  });

  camera.start().catch(err => {
    document.getElementById('load-status').textContent = '⚠ ' + err.message;
    document.getElementById('load-status').style.color = '#ff4444';
    cameraStarted = false;
    document.getElementById('start-btn').style.display = 'block';
  });
}
</script>
</body>
</html>
